<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyClaw 会话管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v=20260513-6" />
    <style>
      body {
        margin: 0;
      }

      body.embedded {
        min-height: auto;
      }

      .session-settings {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .session-settings-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .session-settings-list {
        display: grid;
        gap: 10px;
        max-height: min(68vh, 740px);
        overflow-y: auto;
        overflow-x: hidden;
      }

      .session-settings-item {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #fffef9;
        display: grid;
        gap: 8px;
      }

      .session-settings-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .session-settings-name {
        font-weight: 700;
      }

      .session-settings-meta {
        font-size: 12px;
        color: var(--ink-soft);
      }

      .session-settings-empty {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 14px;
        color: var(--ink-soft);
        background: #ffffffc9;
      }
    </style>
  </head>
  <body>
    <main class="session-settings">
      <header class="session-settings-head">
        <div>
          <p class="kicker">SESSION SETTINGS</p>
          <h2>归档会话</h2>
        </div>
        <button id="refreshArchivedBtn" class="ghost-btn" type="button">刷新</button>
      </header>

      <div id="archivedSessionHint" class="input-hint">正在加载归档会话...</div>
      <div id="archivedSessionList" class="session-settings-list"></div>
    </main>

    <script src="/static/sessions.js?v=20260513-1"></script>
  </body>
</html>
