<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高级设置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      .advanced-page { padding: 16px 20px; max-width: 720px; }
      .advanced-page h2 { margin: 0 0 6px; font-size: 18px; }
      .advanced-page .kicker { margin-bottom: 16px; }
      .setting-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #ffffffd9;
        padding: 14px 16px;
        margin-bottom: 12px;
      }
      .setting-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .setting-card-title { font-size: 14px; font-weight: 700; margin: 0; }
      .setting-card-desc { font-size: 12px; color: var(--ink-soft); margin: 6px 0 0; line-height: 1.5; }
      /* Toggle switch */
      .toggle-switch {
        position: relative;
        width: 44px;
        height: 24px;
        flex-shrink: 0;
      }
      .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
      .toggle-slider {
        position: absolute; inset: 0;
        background: #ccc;
        border-radius: 24px;
        cursor: pointer;
        transition: background 0.25s ease;
      }
      .toggle-slider::before {
        content: "";
        position: absolute;
        width: 18px; height: 18px;
        left: 3px; top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.25s ease;
        box-shadow: 0 1px 3px #00000030;
      }
      .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
      .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
      .setting-card-footer { margin-top: 8px; font-size: 11px; color: var(--ink-soft); }
      .debug-log-path { font-family: "Space Grotesk", monospace; background: #f5f0e8; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="advanced-page">
      <p class="kicker">ADVANCED SETTINGS</p>
      <h2>高级设置</h2>

      <div class="setting-card">
        <div class="setting-card-header">
          <div>
            <h3 class="setting-card-title">调试模式</h3>
            <p class="setting-card-desc">开启后，LLM 请求/响应内容、工具调用参数和返回结果等详细信息会写入日志文件，便于排查问题。</p>
          </div>
          <label class="toggle-switch" title="调试模式开关">
            <input type="checkbox" id="debugToggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-card-footer">
          日志文件路径：<span class="debug-log-path">~/.myclaw/myclaw.log</span>
        </div>
      </div>

      <!-- 全局代理设置 -->
      <div class="setting-card">
        <div class="setting-card-header">
          <div>
            <h3 class="setting-card-title">全局代理</h3>
            <p class="setting-card-desc">为 LLM 和嵌入模型的 HTTP 请求配置代理服务器。支持 HTTP 和 SOCKS5 代理。</p>
          </div>
          <label class="toggle-switch" title="全局代理开关">
            <input type="checkbox" id="proxyToggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div id="proxyFields" style="margin-top: 10px; display: none;">
          <div style="margin-bottom: 8px;">
            <label for="proxyUrl" style="font-size: 12px; font-weight: 500;">代理地址</label>
            <input id="proxyUrl" type="text" placeholder="http://127.0.0.1:7890 或 socks5://127.0.0.1:1080" style="width: 100%; margin-top: 4px; box-sizing: border-box;" />
          </div>
          <div style="margin-bottom: 8px;">
            <label for="proxyNoProxy" style="font-size: 12px; font-weight: 500;">不走代理的地址（逗号分隔）</label>
            <input id="proxyNoProxy" type="text" placeholder="localhost, 127.0.0.1, *.local" style="width: 100%; margin-top: 4px; box-sizing: border-box;" />
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button id="proxySaveBtn" class="btn primary" type="button" style="border-radius: 999px; padding: 6px 14px; font-size: 12px; cursor: pointer; border: 1px solid #00000033; background: linear-gradient(120deg, #d94a2a, #f0824a); color: #fff;">保存</button>
            <span id="proxyStatus" style="font-size: 12px; color: var(--ink-soft);"></span>
          </div>
        </div>
        <div class="setting-card-footer">
          代理配置保存于：<span class="debug-log-path">~/.myclaw/proxy_config.json</span>
        </div>
      </div>
    </div>
    <script src="/static/advanced.js"></script>
  </body>
</html>
