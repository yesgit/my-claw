<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyClaw MCP 配置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      .page-wrap {
        max-width: 1100px;
        margin: 14px auto;
        padding: 0 16px 16px;
        display: grid;
        gap: 12px;
      }

      .mcp-form {
        display: grid;
        gap: 10px;
      }

      .mcp-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mcp-status {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fffef9;
        font-size: 13px;
        color: var(--ink-soft);
      }

      .mcp-status.ok {
        color: var(--ok);
        border-color: #12846f66;
      }

      .mcp-status.err {
        color: var(--err);
        border-color: #c5371a66;
      }

      .server-list {
        display: grid;
        gap: 10px;
      }

      .server-item {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #fffef9;
        display: grid;
        gap: 8px;
      }

      .server-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .server-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr;
      }

      .server-grid input,
      .server-grid textarea {
        width: 100%;
      }

      .server-grid textarea {
        min-height: 72px;
        resize: vertical;
      }

      .hint {
        margin: 0;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .btn {
        border: 1px solid var(--line);
        background: #fffef9;
        color: var(--ink);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .btn.primary {
        background: linear-gradient(120deg, #d94a2a, #f0824a);
        color: #fff;
        border-color: #00000033;
      }

      .btn.danger {
        border-color: #c5371a66;
        color: var(--err);
        background: #fff0ec;
      }

      .empty-tip {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 12px;
        color: var(--ink-soft);
        background: #fffef9;
      }

      @media (min-width: 860px) {
        .server-grid {
          grid-template-columns: 1fr 1fr;
        }

        .server-grid .full {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <header class="top-nav panel">
      <div class="top-nav-left">
        <p class="kicker">MYCLAW CONSOLE</p>
        <strong>MCP Configuration</strong>
      </div>
      <div class="top-nav-links">
        <a class="nav-link" href="/">控制台</a>
        <a class="nav-link active" href="/settings#mcp">配置中心</a>
      </div>
    </header>

    <main class="page-wrap">
      <section class="panel">
        <p class="kicker">MCP SETTINGS</p>
        <h2 style="margin: 4px 0 10px;">多 Server 配置</h2>
        <div class="mcp-form">
          <label for="mcpConfigPath">兜底配置文件路径（可选）</label>
          <input id="mcpConfigPath" type="text" placeholder="当下方 servers 为空时，回退读取此文件" />
          <p class="hint">优先使用下方内嵌 servers。只有当 servers 为空时，才使用此路径。</p>
          <div class="mcp-actions">
            <button id="addServerBtn" class="btn" type="button">+ 添加 Server</button>
            <button id="saveMcpBtn" class="btn primary" type="button">保存配置</button>
            <button id="validateMcpBtn" class="btn" type="button">校验配置</button>
            <button id="testAllBtn" class="btn" type="button">测试全部 Server</button>
          </div>
          <div id="mcpStatus" class="mcp-status">加载中...</div>
        </div>
      </section>

      <section class="panel">
        <div class="section-row">
          <p class="section-title">MCP Servers</p>
          <span id="serverCount" class="input-hint">0</span>
        </div>
        <div id="serverList" class="server-list"></div>
      </section>
    </main>

    <script>
      if (new URLSearchParams(window.location.search).get("embedded") === "1") {
        const topNav = document.querySelector(".top-nav");
        if (topNav) {
          topNav.style.display = "none";
        }
      }
    </script>
    <script src="/static/mcp.js"></script>
  </body>
</html>
