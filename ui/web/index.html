<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyClaw Agent Desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v=20260515-6" />
  </head>
  <body class="console-page">
    <div class="bg-noise" aria-hidden="true"></div>
    <header class="top-nav panel">
      <div class="top-nav-left">
        <p class="kicker">MYCLAW CONSOLE</p>
        <strong>Agent Workspace</strong>
      </div>
      <div class="top-nav-links">
        <a class="nav-link active" href="/">控制台</a>
        <a class="nav-link" href="/settings">配置中心</a>
      </div>
    </header>
    <main class="desk-layout">
      <aside class="rail panel">
        <div class="rail-head">
          <div class="logo-block">
            <span class="logo-dot"></span>
            <div>
              <p class="kicker">MYCLAW</p>
              <h1>Agent Desk</h1>
            </div>
          </div>
          <div id="healthBadge" class="health checking">连接检测中</div>
        </div>

        <div class="rail-tabs" role="tablist" aria-label="侧边栏视图">
          <button id="railTabSessions" class="rail-tab active" type="button" role="tab" aria-selected="true">会话</button>
          <button id="railTabSchedules" class="rail-tab" type="button" role="tab" aria-selected="false">定时任务</button>
        </div>

        <div id="railPaneSessions" class="rail-pane">
          <div class="rail-section">
          <div class="section-row">
            <p class="section-title">会话列表</p>
            <div style="display: flex; gap: 6px;">
              <button id="createSessionBtn" class="ghost-btn" type="button">新建</button>
              <button id="refreshSessionsBtn" class="ghost-btn" type="button">刷新</button>
              <a class="ghost-btn as-link" href="/settings#sessions">更多会话</a>
            </div>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
        </div>

        <div id="railPaneSchedules" class="rail-pane" hidden>
          <div class="rail-section schedule-panel">
          <div class="section-row">
            <p class="section-title">定时任务</p>
            <div style="display: flex; gap: 6px;">
              <button id="createSessionFromScheduleBtn" class="ghost-btn" type="button">新建</button>
              <button id="refreshSchedulesBtn" class="ghost-btn" type="button">刷新</button>
            </div>
          </div>
          <div id="scheduleHint" class="input-hint"></div>

          <div class="section-row">
            <p class="section-title">定时任务会话</p>
          </div>
          <div id="runtimeSessionHint" class="input-hint"></div>
          <div id="runtimeSessionList" class="runtime-session-list"></div>

          <div id="scheduleList" class="schedule-list"></div>
        </div>
        </div>
      </aside>

      <section class="feed panel">
        <header class="feed-head">
          <div>
            <p class="kicker">MISSION FEED</p>
            <h2>问答执行时间线</h2>
          </div>
        </header>

        <div class="chat-toolbar">
          <div class="chat-toolbar-meta" id="sessionMetaInline">当前会话: -</div>
        </div>

        <div class="debug-tabs">
          <div class="debug-tab-buttons">
            <button class="debug-tab-btn active" data-tab="chat" type="button">聊天</button>
            <button class="debug-tab-btn" data-tab="console" type="button">控制台</button>
            <button class="debug-tab-btn" data-tab="perm" type="button">权限</button>
          </div>

          <div class="debug-tab-content">
            <!-- 聊天标签页 (默认显示) -->
            <div id="chatTab" class="debug-tab-pane active">
              <div class="feed-body">
                <div class="timeline-shell">
                  <div id="timeline" class="timeline"></div>
                </div>
              </div>
            </div>

            <!-- 控制台标签页 -->
            <div id="consoleTab" class="debug-tab-pane">
              <div id="consoleSection" class="debug-section-content">
                <div class="console-head">
                  <p class="section-title">实时控制台</p>
                </div>
                <div id="consoleLog" class="console-log" aria-live="polite"></div>
                <div id="approvalQueue" class="approval-queue" aria-live="polite"></div>
              </div>
            </div>

            <!-- 权限标签页 -->
            <div id="permTab" class="debug-tab-pane">
              <div class="perm-section">
                <div class="perm-section-head">
                  <p class="section-title">🔧 工具权限</p>
                  <button id="permRefreshBtn" class="ghost-btn" type="button">刷新</button>
                </div>
                <div id="permToolTree" class="perm-tree"></div>
              </div>
              <div class="perm-section">
                <div class="perm-section-head">
                  <p class="section-title">📋 持久规则 (<span id="permGlobalRuleCount">0</span>)</p>
                </div>
                <div id="permGlobalRules" class="perm-rules-list"></div>
              </div>
              <div class="perm-section">
                <div class="perm-section-head">
                  <p class="section-title">🔒 会话规则 (<span id="permSessionRuleCount">0</span>)</p>
                </div>
                <div id="permSessionRules" class="perm-rules-list"></div>
                <div id="permNoSessionHint" class="input-hint">请先选择一个会话</div>
              </div>
              <div class="perm-section">
                <div class="perm-section-head">
                  <p class="section-title">⏳ 待审批 (<span id="permPendingCount">0</span>)</p>
                </div>
                <div id="permPendingList" class="perm-pending-list"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="composer panel" id="composerArea">
          <div id="attachmentChips" class="attachment-chips"></div>
          <div class="composer-config-row">
            <div class="config-quick-items">
              <button id="configChipModel" class="config-chip" type="button" title="点击选择模型">
                <span class="config-chip-icon" aria-hidden="true">◈</span>
                <span id="configChipModelLabel">模型: -</span>
              </button>
            </div>
            <a class="config-link" href="/settings">更多配置</a>
          </div>
          <div class="composer-input-row">
            <div class="textarea-wrap">
              <textarea id="goal" rows="2" placeholder="例如：帮我读取设计文档并总结架构，然后生成一个待办清单"></textarea>
              <button id="attachBtn" class="attach-btn" type="button" title="添加附件" aria-label="添加附件">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
              </button>
            </div>
            <input id="fileInput" type="file" multiple hidden />
            <button id="runBtn" class="run-btn" type="button">发送</button>
          </div>
          <div class="composer-hints">
            <div class="chips" id="goalChips"></div>
            <div class="input-hint">Enter 发送，Shift+Enter 换行。可拖拽或粘贴文件到此处。</div>
          </div>
        </div>
      </section>

      <!-- 隐藏的配置容器：保留用于popover内容源 -->
      <div id="configFormContainer" style="display: none;">
        <select id="sessionSelect"></select>
        <div id="sessionHint" class="input-hint">加载会话中...</div>
        <select id="providerSelect"></select>
        <select id="modelSelect"></select>
        <input id="maxSteps" type="number" min="1" max="100" value="50" />
        <div id="currentModelTag" class="model-tag">当前模型: -</div>
        <div id="mcpConfigHint" class="input-hint">加载中...</div>
        <div id="modelProfileHint" class="input-hint">加载中...</div>
        <div id="sessionMeta" class="session-meta compact">当前会话: -</div>
        <div id="recentModelSwitches" class="recent-switches"></div>
      </div>
    </main>

    <!-- Popovers （在main外部） -->
    <div id="sessionPopover" class="config-popover" hidden>
        <div class="popover-head">
          <p class="section-title">选择会话</p>
          <button class="popover-close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="popover-content">
          <select id="sessionSelectPopover"></select>
          <div id="sessionHintPopover" class="input-hint">加载会话中...</div>
        </div>
      </div>

      <div id="modelPopover" class="config-popover" hidden>
        <div class="popover-head">
          <p class="section-title">选择模型</p>
          <button class="popover-close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="popover-content">
          <div class="compact-field">
            <label for="providerSelectPopover">模型提供方</label>
            <select id="providerSelectPopover"></select>
          </div>
          <div class="compact-field">
            <label for="modelSelectPopover">模型</label>
            <select id="modelSelectPopover"></select>
          </div>
          <div id="currentModelTagPopover" class="model-tag" style="margin-top: 12px;">当前模型: -</div>
        </div>
      </div>

    <template id="stepTemplate">
      <article class="step-card">
        <header class="step-header">
          <div class="step-meta"></div>
          <span class="pill"></span>
        </header>
        <details>
          <summary>查看详情</summary>
          <pre></pre>
        </details>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="/static/app.js?v=20260515-3"></script>
    <script src="/static/perm-tab.js?v=20260518-1"></script>
  </body>
</html>
