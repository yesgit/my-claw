<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyClaw 配置中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      body {
        overflow: auto;
      }

      .settings-layout {
        max-width: 1400px;
        height: auto;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .settings-nav {
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .settings-nav-btn {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fffef9;
        color: var(--ink);
        padding: 10px;
        cursor: pointer;
        font: inherit;
      }

      .settings-nav-btn.active {
        border-color: #d94a2a66;
        background: linear-gradient(130deg, #ffd6bf, #fff4db);
      }

      .settings-content {
        min-height: 620px;
        display: grid;
      }

      .settings-frame {
        display: block;
        width: 100%;
        min-height: 620px;
        border: 0;
        border-radius: 12px;
        background: #fffef9;
      }

      .settings-info {
        margin-top: 8px;
        font-size: 12px;
        color: var(--ink-soft);
      }

      @media (min-width: 980px) {
        body {
          overflow: hidden;
        }

        .settings-layout {
          height: calc(100vh - 106px);
          grid-template-columns: minmax(220px, 0.7fr) minmax(0, 2fr);
          grid-template-rows: 1fr;
          align-items: stretch;
          overflow: hidden;
        }

        .settings-content {
          display: flex;
          flex-direction: column;
          min-height: 0;
          overflow: hidden;
        }

        .settings-frame {
          flex: 1;
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <header class="top-nav panel">
      <div>
        <p class="kicker">MYCLAW CONFIG CENTER</p>
        <h1>统一配置入口</h1>
      </div>
      <div class="top-nav-links">
        <a class="nav-link" href="/">控制台</a>
        <a class="nav-link active" href="/settings">配置中心</a>
        <a class="nav-link" href="/knowledge">知识库</a>
      </div>
    </header>

    <main class="settings-layout">
      <aside class="panel settings-nav">
        <p class="section-title">配置分类</p>
        <button id="navModels" class="settings-nav-btn" type="button" data-target="models">模型配置</button>
        <button id="navMcp" class="settings-nav-btn" type="button" data-target="mcp">MCP 配置</button>
        <button id="navSessions" class="settings-nav-btn" type="button" data-target="sessions">会话管理</button>
        <button id="navExportImport" class="settings-nav-btn" type="button" data-target="export-import">导入导出</button>
        <button id="navQuickPrompts" class="settings-nav-btn" type="button" data-target="quick-prompts">快捷提问</button>
        <p class="settings-info">左侧切换配置模块，右侧直接编辑并保存。</p>
      </aside>

      <section class="panel settings-content">
        <iframe id="settingsFrame" class="settings-frame" title="配置内容" src="/models?embedded=1" scrolling="auto"></iframe>
      </section>
    </main>

    <script src="/static/settings.js"></script>
  </body>
</html>
