<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyClaw 知识库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      body {
        overflow: auto;
      }

      .kb-layout {
        max-width: 1400px;
        height: auto;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
        overflow: visible;
      }

      /* 左侧导航 */
      .kb-nav {
        display: grid;
        gap: 6px;
        align-content: start;
      }

      .kb-nav-group-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink-soft);
        margin-top: 8px;
        padding: 0 2px;
      }

      .kb-nav-group-title:first-child {
        margin-top: 0;
      }

      .kb-nav-btn {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fffef9;
        color: var(--ink);
        padding: 10px;
        cursor: pointer;
        font: inherit;
      }

      .kb-nav-btn.active {
        border-color: #d94a2a66;
        background: linear-gradient(130deg, #ffd6bf, #fff4db);
      }

      .kb-nav-btn.disabled {
        opacity: 0.45;
        cursor: default;
        pointer-events: none;
      }

      .kb-nav-hint {
        font-size: 10px;
        color: var(--ink-soft);
        margin-left: 4px;
        font-weight: 400;
      }

      .kb-nav-info {
        margin-top: 8px;
        font-size: 12px;
        color: var(--ink-soft);
      }

      /* 右侧内容区 */
      .kb-content {
        min-height: 620px;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .kb-pane {
        display: none;
      }

      .kb-pane.active {
        display: grid;
        gap: 10px;
      }

      /* 通用表单 & 列表 */
      .kb-form {
        display: grid;
        gap: 10px;
      }

      .kb-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .kb-status {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fffef9;
        font-size: 13px;
        color: var(--ink-soft);
      }

      .kb-status.ok { color: var(--ok); border-color: #12846f66; }
      .kb-status.err { color: var(--err); border-color: #c5371a66; }

      .doc-list {
        display: grid;
        gap: 10px;
      }

      .doc-item {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #fffef9;
        display: grid;
        gap: 6px;
      }

      .doc-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .doc-title {
        font-weight: 700;
        font-size: 14px;
        color: var(--ink);
      }

      .doc-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .doc-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .doc-tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        background: #f0ebe3;
        color: var(--ink-soft);
      }

      .hint {
        margin: 0;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .btn {
        border: 1px solid var(--line);
        background: #fffef9;
        color: var(--ink);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .btn.primary {
        background: linear-gradient(120deg, #d94a2a, #f0824a);
        color: #fff;
        border-color: #00000033;
      }

      .btn.danger {
        border-color: #c5371a66;
        color: var(--err);
        background: #fff0ec;
      }

      .empty-tip {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 12px;
        color: var(--ink-soft);
        background: #fffef9;
      }

      .search-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .search-row input {
        flex: 1;
      }

      .search-results {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .search-result {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        background: #fffef9;
        font-size: 13px;
      }

      .search-result .score {
        font-size: 11px;
        color: var(--ink-soft);
      }

      /* 文档详情/编辑面板 */
      .doc-detail-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 100;
        justify-content: center;
        align-items: center;
      }

      .doc-detail-overlay.active {
        display: flex;
      }

      .doc-detail-panel {
        background: #fffef9;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        width: 90%;
        max-width: 720px;
        max-height: 85vh;
        overflow-y: auto;
        display: grid;
        gap: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      }

      .doc-detail-panel .detail-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .doc-detail-panel .detail-title {
        font-weight: 700;
        font-size: 16px;
        color: var(--ink);
      }

      .doc-detail-panel .detail-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .doc-detail-panel .detail-content {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        background: #fff;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 40vh;
        overflow-y: auto;
      }

      .doc-detail-panel .edit-field {
        width: 100%;
        font: inherit;
        font-size: 13px;
      }

      .doc-detail-panel .edit-field.title-input {
        font-size: 16px;
        font-weight: 700;
        padding: 6px 8px;
      }

      .doc-detail-panel textarea.edit-field {
        min-height: 200px;
        resize: vertical;
        padding: 10px;
        line-height: 1.6;
      }

      .doc-item-clickable {
        cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .doc-item-clickable:hover {
        border-color: #d94a2a66;
        box-shadow: 0 2px 8px rgba(217,74,42,0.08);
      }

      .add-form {
        display: grid;
        gap: 8px;
      }

      .add-form textarea {
        min-height: 100px;
        resize: vertical;
      }

      .add-form input, .add-form textarea {
        width: 100%;
      }

      .embed-config-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr;
      }

      @media (min-width: 860px) {
        .embed-config-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .embed-config-grid .full {
        grid-column: 1 / -1;
      }

      /* 桌面端分栏 */
      @media (min-width: 980px) {
        body {
          overflow: hidden;
        }

        .kb-layout {
          height: calc(100vh - 106px);
          grid-template-columns: minmax(220px, 0.7fr) minmax(0, 2fr);
          grid-template-rows: 1fr;
          align-items: stretch;
          overflow: hidden;
        }

        .kb-content {
          min-height: 0;
          overflow-y: auto;
          align-content: start;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <header class="top-nav panel">
      <div class="top-nav-left">
        <p class="kicker">MYCLAW KNOWLEDGE BASE</p>
        <strong>知识库</strong>
      </div>
      <div class="top-nav-links">
        <a class="nav-link" href="/">控制台</a>
        <a class="nav-link" href="/settings">配置中心</a>
        <a class="nav-link active" href="/knowledge">知识库</a>
      </div>
    </header>

    <main class="kb-layout">
      <!-- 左侧导航 -->
      <aside class="panel kb-nav">
        <p class="kb-nav-group-title">本地知识库</p>
        <button class="kb-nav-btn active" data-pane="docs" type="button">文档管理</button>
        <button class="kb-nav-btn" data-pane="search" type="button">搜索测试</button>
        <button class="kb-nav-btn" data-pane="embed" type="button">嵌入模型配置</button>

        <p class="kb-nav-group-title">外部知识库</p>
        <button class="kb-nav-btn disabled" type="button" disabled>外部知识库<span class="kb-nav-hint">即将支持</span></button>

        <p class="kb-nav-info">左侧切换知识库模块，右侧直接操作。</p>
      </aside>

      <!-- 右侧内容区 -->
      <section class="panel kb-content">
        <!-- 文档管理 -->
        <div id="paneDocs" class="kb-pane active">
          <div class="kb-actions">
            <button id="addTextBtn" class="btn" type="button">+ 添加文本</button>
            <button id="refreshDocsBtn" class="btn" type="button">刷新</button>
            <button id="rebuildIndexBtn" class="btn" type="button">重建索引</button>
          </div>

          <!-- 添加文本表单（默认隐藏） -->
          <div id="addTextForm" class="panel kb-form" style="display:none; padding: 12px; border: 1px solid var(--line); border-radius: 12px; background: #fffef9;">
            <p class="section-title">添加文本文档</p>
            <div class="add-form">
              <input id="addTitle" type="text" placeholder="文档标题" />
              <input id="addTags" type="text" placeholder="标签（逗号分隔，可选）" />
              <textarea id="addContent" placeholder="文档内容..."></textarea>
              <div class="kb-actions">
                <button id="submitAddBtn" class="btn primary" type="button">提交</button>
                <button id="cancelAddBtn" class="btn" type="button">取消</button>
              </div>
            </div>
          </div>

          <div class="section-row">
            <p class="section-title">文档列表 (<span id="docCount">0</span>)</p>
          </div>
          <div id="docList" class="doc-list">
            <div class="empty-tip">暂无文档，点击"+ 添加文本"开始</div>
          </div>
        </div>

        <!-- 搜索测试 -->
        <div id="paneSearch" class="kb-pane">
          <p class="section-title">搜索知识库</p>
          <div class="search-row">
            <input id="searchQuery" type="text" placeholder="输入搜索关键词..." />
            <button id="searchBtn" class="btn primary" type="button">搜索</button>
          </div>
          <div id="searchStatus" class="kb-status" style="display: none;"></div>
          <div id="searchResults" class="search-results"></div>
        </div>

        <!-- 嵌入模型配置 -->
        <div id="paneEmbed" class="kb-pane">
          <p class="section-title">嵌入模型配置</p>
          <div class="embed-config-grid">
            <div>
              <label for="embedProvider">提供方</label>
              <select id="embedProvider">
                <option value="openai_compatible">OpenAI Compatible</option>
                <option value="mock">Mock（测试用）</option>
              </select>
            </div>
            <div>
              <label for="embedModel">模型名称</label>
              <input id="embedModel" type="text" placeholder="text-embedding-3-small" />
            </div>
            <div>
              <label for="embedBaseUrl">API Base URL</label>
              <input id="embedBaseUrl" type="text" placeholder="https://api.openai.com/v1" />
            </div>
            <div>
              <label for="embedApiKey">API Key</label>
              <input id="embedApiKey" type="password" placeholder="sk-..." />
            </div>
            <div>
              <label for="embedDimension">向量维度</label>
              <input id="embedDimension" type="number" value="1536" min="1" />
            </div>
            <div>
              <label for="embedTimeout">超时（秒）</label>
              <input id="embedTimeout" type="number" value="30" min="1" />
            </div>
            <div class="form-row">
              <label for="embedProxyMode">代理模式</label>
              <select id="embedProxyMode">
                <option value="global">跟随全局</option>
                <option value="custom">自定义代理</option>
                <option value="none">不走代理</option>
              </select>
            </div>
            <div class="form-row" id="embedProxyUrlRow">
              <label for="embedProxyUrl">代理地址</label>
              <input id="embedProxyUrl" type="text" placeholder="http://127.0.0.1:7890" />
            </div>
          </div>
          <div class="kb-actions" style="margin-top: 10px;">
            <button id="saveEmbedBtn" class="btn primary" type="button">保存配置</button>
            <button id="regenEmbedBtn" class="btn" type="button">重新生成所有向量</button>
          </div>
          <div id="embedStatus" class="kb-status" style="display: none;"></div>
        </div>
      </section>
    </main>

    <!-- 文档详情/编辑浮层 -->
    <div id="docDetailOverlay" class="doc-detail-overlay">
      <div class="doc-detail-panel">
        <div class="detail-head">
          <span id="detailModeTag" style="font-size:11px;color:var(--ink-soft);"></span>
          <div style="display:flex;gap:6px;">
            <button id="detailEditBtn" class="btn" type="button">编辑</button>
            <button id="detailSaveBtn" class="btn primary" type="button" style="display:none;">保存</button>
            <button id="detailCancelEditBtn" class="btn" type="button" style="display:none;">取消</button>
            <button id="detailCloseBtn" class="btn" type="button">关闭</button>
          </div>
        </div>
        <!-- 查看模式 -->
        <div id="detailViewMode">
          <div id="detailTitle" class="detail-title"></div>
          <div id="detailMeta" class="detail-meta"></div>
          <div id="detailTags" class="doc-tags"></div>
          <div id="detailContent" class="detail-content"></div>
        </div>
        <!-- 编辑模式 -->
        <div id="detailEditMode" style="display:none;">
          <input id="editTitle" class="edit-field title-input" type="text" placeholder="文档标题" />
          <input id="editTags" class="edit-field" type="text" placeholder="标签（逗号分隔）" />
          <textarea id="editContent" class="edit-field" placeholder="文档内容..."></textarea>
        </div>
        <div id="detailStatus" class="kb-status" style="display:none;"></div>
      </div>
    </div>

    <script src="/static/knowledge.js"></script>
  </body>
</html>
